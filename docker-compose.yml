services:
  # PHP Application (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: inc_hymns-app
    container_name: inc_hymns-app
    restart: unless-stopped
    env_file: .env.docker
    volumes:
      - ./:/var/www
      - /var/www/vendor
      - /var/www/public/build
    networks:
      - inc_hymns-network
    depends_on:
      - db
      - redis

  # Web Server (Nginx)
  web:
    image: nginx:alpine
    container_name: inc_hymns-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - inc_hymns-network
    depends_on:
      - app

  # Database (MySQL)
  db:
    image: mysql:8.0
    container_name: inc_hymns-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-inc_hymns}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-masunurin}
      MYSQL_USER: ${DB_USERNAME:-inc_hymns}
    volumes:
      - db-data:/var/lib/mysql
      # Uncomment the following line to auto-import SQL on first run:
      # - ./inc_hymns (3).sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - inc_hymns-network

  # Cache (Redis)
  redis:
    image: redis:alpine
    container_name: inc_hymns-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - inc_hymns-network

# Networks
networks:
  inc_hymns-network:
    driver: bridge

# Volumes
volumes:
  db-data:
    driver: local
  redis-data:
    driver: local

